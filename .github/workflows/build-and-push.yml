name: build-and-push
on:
  push:
    tags:
      - "*"
jobs:
  build-amd64:
    runs-on: ubuntu-latest
    outputs:
      image: ghcr.io/lukejoshuapark/instant-coffee-dotnet:${{ github.ref_name }}-amd64
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - run: |
          docker buildx build \
            --push \
            --platform linux/amd64 \
            --tag ghcr.io/lukejoshuapark/instant-coffee-dotnet:${{ github.ref_name }}-amd64 .
  build-arm64:
    runs-on: ubuntu-latest
    outputs:
      image: ghcr.io/lukejoshuapark/instant-coffee-dotnet:${{ github.ref_name }}-arm64
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - run: |
          docker buildx build \
            --push \
            --platform linux/arm64/v8 \
            --tag ghcr.io/lukejoshuapark/instant-coffee-dotnet:${{ github.ref_name }}-arm64 .
  manifest:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker manifest create ghcr.io/lukejoshuapark/instant-coffee-dotnet:${{ github.ref_name }} \
            --amend ghcr.io/lukejoshuapark/instant-coffee-dotnet:${{ github.ref_name }}-amd64 \
            --amend ghcr.io/lukejoshuapark/instant-coffee-dotnet:${{ github.ref_name }}-arm64
          docker manifest push ghcr.io/lukejoshuapark/instant-coffee-dotnet:${{ github.ref_name }}
